services:
  - type: web
    name: djic-backend
    runtime: python
    rootDir: src/Backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: daphne -b 0.0.0.0 -p $PORT core.asgi:application
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: MONGO_TLS_ALLOW_INVALID_CERTS
        value: "True"
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "False"
      - key: JWT_ACCESS_TOKEN_LIFETIME
        value: "60"
      - key: JWT_REFRESH_TOKEN_LIFETIME
        value: "1440"
      - key: AUTH_THROTTLE_RATE
        value: "20/minute"
      # Uzupełnij ręcznie w dashboardzie Render:
      # MONGO_URI, ENCRYPTION_KEY, CORS_ALLOWED_ORIGINS, FRONTEND_URL
      # EMAIL_TOKEN, MAILERSEND_SENDER_EMAIL
